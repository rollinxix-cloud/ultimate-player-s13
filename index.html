<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Player - Season 13</title>
    <style>
        :root {
            --bg-color: #0a0f1d;
            --container-bg: rgba(16, 22, 41, 0.75);
            --border-color: #1e293b;
            --text-color: #f8fafc;
            --accent-left: #00f2fe;
            --accent-right: #fe019a;
            --match-bg: rgba(30, 41, 59, 0.5);
        }

        [data-theme="light"] {
            --bg-color: #f1f5f9;
            --container-bg: rgba(255, 255, 255, 0.85);
            --border-color: #cbd5e1;
            --text-color: #0f172a;
            --match-bg: rgba(226, 232, 240, 0.8);
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at center, #1a1f3c 0%, var(--bg-color) 100%);
            color: var(--text-color);
            transition: background 0.3s, color 0.3s;
            min-height: 100vh;
        }

        header {
            text-align: center;
            padding: 20px;
            background: var(--container-bg);
            border-bottom: 2px solid var(--accent-left);
            backdrop-filter: blur(10px);
        }

        h1 {
            margin: 0;
            font-size: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: linear-gradient(90deg, var(--accent-left), var(--accent-right));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            margin: 5px 0 0;
            font-size: 1rem;
            opacity: 0.8;
        }

        .controls {
            position: absolute;
            top: 25px;
            right: 20px;
        }

        .btn {
            background: linear-gradient(45deg, var(--accent-left), #4facfe);
            border: none;
            color: #000;
            padding: 8px 16px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn:hover { transform: scale(1.05); }

        .bracket-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 40px 20px;
            max-width: 1400px;
            margin: 0 auto;
            gap: 20px;
        }

        .bracket-side {
            display: flex;
            width: 42%;
            justify-content: space-between;
        }

        .round {
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            width: 45%;
        }

        .center-final {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 16%;
            text-align: center;
            background: var(--container-bg);
            padding: 20px;
            border-radius: 8px;
            border: 2px solid var(--accent-right);
            backdrop-filter: blur(10px);
        }

        .match {
            background: var(--match-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            margin: 15px 0;
            padding: 10px;
            backdrop-filter: blur(5px);
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .left-side .match { border-left: 4px solid var(--accent-left); }
        .right-side .match { border-right: 4px solid var(--accent-right); }

        .team {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            font-size: 0.95rem;
        }

        .team.winner {
            font-weight: bold;
            color: #4ade80;
        }

        .score {
            font-variant-numeric: tabular-nums;
            background: rgba(0,0,0,0.2);
            padding: 0 6px;
            border-radius: 3px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Ultimate Player</h1>
        <div class="subtitle">Season 13 • 16-Player Knockout (2-Legs)</div>
        <div class="controls">
            <button class="btn" onclick="toggleTheme()">🌓 Toggle Mode</button>
        </div>
    </header>

    <div class="bracket-container">
        <div class="bracket-side left-side">
            <div class="round" id="r16-left"></div>
            <div class="round" id="qf-left"></div>
        </div>

        <div class="center-final">
            ### 🏆 CHAMPION
            <div id="champion-display" style="font-size: 1.4rem; font-weight: bold; color: gold; margin-top: 10px;">TBD</div>
        </div>

        <div class="bracket-side right-side">
            <div class="round" id="qf-right"></div>
            <div class="round" id="r16-right"></div>
        </div>
    </div>

    <script src="data.js"></script>
    <script>
        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            document.documentElement.setAttribute('data-theme', currentTheme === 'light' ? 'dark' : 'light');
        }

        function renderSide(matches, containerId, side) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            matches.forEach(m => {
                const matchDiv = document.createElement('div');
                matchDiv.className = 'match';
                matchDiv.innerHTML = `
                    <div class="team ${m.w === 1 ? 'winner' : ''}">
                        <span>${m.p1}</span> <span class="score">${m.s1_1 || 0}-${m.s1_2 || 0}</span>
                    </div>
                    <div class="team ${m.w === 2 ? 'winner' : ''}">
                        <span>${m.p2}</span> <span class="score">${m.s2_1 || 0}-${m.s2_2 || 0}</span>
                    </div>
                `;
                container.appendChild(matchDiv);
            });
        }

        // Initial Dynamic Load
        if (typeof tournamentData !== 'undefined') {
            renderSide(tournamentData.r16.slice(0, 4), 'r16-left', 'left');
            renderSide(tournamentData.r16.slice(4, 8), 'r16-right', 'right');
            renderSide(tournamentData.qf.slice(0, 2), 'qf-left', 'left');
            renderSide(tournamentData.qf.slice(2, 4), 'qf-right', 'right');
            document.getElementById('champion-display').innerText = tournamentData.champion || "UNDECIDED";
        }
    </script>
</body>
</html>
